version: "3.9"

services:

  # ── Databases (one per service, fully isolated) ──────────────────────────

  postgres-identity:
    image: postgres:16-alpine
    container_name: de-postgres-identity
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_pass
    ports:
      - "5437:5432"
    volumes:
      - identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_user -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de-network

  postgres-category:
    image: postgres:16-alpine
    container_name: de-postgres-category
    environment:
      POSTGRES_DB: category_db
      POSTGRES_USER: category_user
      POSTGRES_PASSWORD: category_pass
    ports:
      - "5433:5432"
    volumes:
      - category_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U category_user -d category_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de-network

  postgres-expense:
    image: postgres:16-alpine
    container_name: de-postgres-expense
    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_pass
    ports:
      - "5434:5432"
    volumes:
      - expense_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expense_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de-network

  postgres-savings-goal:
    image: postgres:16-alpine
    container_name: de-postgres-savings-goal
    environment:
      POSTGRES_DB: savings_goal_db
      POSTGRES_USER: savings_goal_user
      POSTGRES_PASSWORD: savings_goal_pass
    ports:
      - "5435:5432"
    volumes:
      - savings_goal_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savings_goal_user -d savings_goal_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de-network

  postgres-budget:
    image: postgres:16-alpine
    container_name: de-postgres-budget
    environment:
      POSTGRES_DB: budget_db
      POSTGRES_USER: budget_user
      POSTGRES_PASSWORD: budget_pass
    ports:
      - "5436:5432"
    volumes:
      - budget_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_user -d budget_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de-network

  # ── Message Broker ────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: de-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: ruok,srvr,stat,mntr
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/2181' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - de-network

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: de-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - de-network

  # ── Object Storage ────────────────────────────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: de-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - de-network

  # ── Email (dev only) ──────────────────────────────────────────────────────

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: de-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # HTTP UI
    networks:
      - de-network

networks:
  de-network:
    driver: bridge

volumes:
  identity_data:
  category_data:
  expense_data:
  savings_goal_data:
  budget_data:
  minio_data:
