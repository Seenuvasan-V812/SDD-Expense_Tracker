server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/identity_db}
    username: ${SPRING_DATASOURCE_USERNAME:identity_user}
    password: ${SPRING_DATASOURCE_PASSWORD:identity_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: user-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET}

minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY:minio_admin}
  secret-key: ${MINIO_SECRET_KEY:minio_secret}
  bucket: user-exports

internal:
  services:
    category-service:
      url: ${CATEGORY_SERVICE_URL:http://localhost:8082}
    expense-service:
      url: ${EXPENSE_SERVICE_URL:http://localhost:8083}
    savings-goal-service:
      url: ${SAVINGS_GOAL_SERVICE_URL:http://localhost:8084}
    budget-service:
      url: ${BUDGET_SERVICE_URL:http://localhost:8085}

outbox:
  relay:
    topic: users
    delay-ms: 5000

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} traceId=%X{traceId} userId=%X{userId} - %msg%n"
